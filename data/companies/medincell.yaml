governance_notes: >
  Founded 2003. IPO on Euronext Paris 2018. Company has a unique social
  mission charter — first French BCorp-certified pharma — which influences
  IP licensing posture (humanitarian access for some malaria/HIV
  programs). Smaller market cap than typical platform-stage biotech;
  cash runway is a continuing investor concern.

