notes: >
  MedinCell's revenue model is royalty/milestone-driven through partners.
  Near-term cash flows dominated by Teva milestones on UZEDY commercial
  ramp and TEV-749 olanzapine PDUFA. AbbVie 2024 deal added $35M upfront
  but milestone receipts are program-progression-gated. Cash runway and
  TEV-749 PDUFA Q4 2026 outcome are the central operational variables.
