notes: >
  Tolmar is the legacy custodian of Atrigel — the foundational in-situ
  depot LAI platform. Atrigel core IP is expired; Eligard generic
  competition is active in some territories. Tolmar's continued commercial
  trajectory under generic pressure is a reference for what happens to
  innovator LAI platforms post-IP-cliff. Private status limits direct
  investability but Tolmar appears periodically in M&A speculation as a
  carve-out candidate. Verify current ownership against latest available
  press; PE secondary transactions can change ownership without public
  announcement.
