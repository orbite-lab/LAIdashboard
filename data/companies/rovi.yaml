notes: >
  Rovi is the European challenger in risperidone LAI. ISM platform IP
  modeled after BEPO/Atrigel in-situ depot architecture. US filing for
  Risvan (Okedi) reportedly in progress; partnership path uncertain.
  Strategic relevance to the tracker: ISM platform is potentially
  available for partnering at the platform level (not just risperidone)
  given Rovi's preference to retain Spanish/EU commercialization while
  out-licensing US/ROW. Founder-family ownership structure complicates
  any acquisition.
