notes: >
  Foundational paliperidone palmitate nanocrystal patent. Reference example
  for how legacy LAI franchises defend exclusivity post-nominal-expiry via
  formulation patents and litigation. Hafyera's 6-month formulation has
  separate IP estate (verify) extending Invega franchise exclusivity into
  the 2030s.
