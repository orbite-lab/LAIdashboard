notes: >
  Original Atrigel composition patent (Dunn et al.) describing biodegradable
  in-situ forming polymer system. Expired 2008. Why Atrigel platform IP
  score is 2: core composition is in the public domain; commercial moat is
  manufacturing scale and product-specific formulation patents. Reference
  point for what happens to in-situ depot platforms after composition
  patents expire — Eligard and Sublocade still trade durably 17+ years
  later, suggesting in-situ depot CMC barriers are durable.
