notes: >
  Foundational composition-of-matter patent family covering peptide hormone
  analogues (Exendin-4, GLP-1, oxyntomodulin, glucagon variants) developed
  by Professor Steve Bloom's lab at Imperial College London. Licensed to
  Zihipp (Imperial spinout) under February 2019 agreement; Zihipp acquired
  by Metsera in 2023. Underlying IP covers the 20,000-peptide library that
  produced MET-097, MET-233, MET-034, and MET-067. IP2IPO retains royalty
  rights through the IP Group plc relationship. Pfizer-acquired Metsera
  late 2025 inherits this license chain. Effective protection through
  ~2036-2037 base; formulation continuations under HALO platform extend
  further.
