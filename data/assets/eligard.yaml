tactbio_view: >
  Reference in-situ depot LAI in oncology; demonstrated that PLGA in-situ
  technology can compete with established microsphere incumbents. Strategic
  context for newer in-situ depot platforms (BEPO, FluidCrystal, ISM) which
  follow the path Eligard pioneered. Tolmar's private status limits
  investment access but commercial trajectory informs category economics.

