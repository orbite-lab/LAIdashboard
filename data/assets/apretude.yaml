tactbio_view: 'Apretude is the structural shift in HIV prevention — moving from daily pill
  adherence (~50% real-world) to bi-monthly injection. Commercial uptake has been slower than
  anticipated due to access, payer, and prescriber dynamics rather than efficacy concerns.
  Watch as the leading indicator for whether LAI PrEP achieves meaningful share of total PrEP
  spend; current trajectory suggests slow but durable growth.

  '
