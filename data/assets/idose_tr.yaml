views:
  investor: >
    iDose's commercial uptake is the leading indicator for multi-year
    ocular implant prescriber acceptance. Bull case: convenience driver
    drives durable share take from daily prostaglandin drops; bear case:
    procedural friction limits adoption beyond a niche specialty segment.
    Pressures Allergan/AbbVie Durysta and sets a higher bar for any new
    ophthalmic LAI platform.
  partner: >
    Not available — internal Glaukos asset.
  acquirer: >
    Glaukos enterprise value is dominated by iDose plus the iStent
    franchise. Strategic fit for any large-cap ophthalmic player; verify
    M&A protections in Glaukos governance.

tactbio_view: >
  Multi-year ocular implant. Commercial uptake is the leading indicator
