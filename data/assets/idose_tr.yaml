  sales_notes: >
    iDose TR is a sustained-release intracameral travoprost implant for
    primary open-angle glaucoma and ocular hypertension. FDA approval
    December 2023; commercial launch 2024. Multi-year duration profile
    differentiates from Allergan/AbbVie Durysta (3-month bimatoprost).
    Commercial trajectory in 2024-2025 is the leading indicator for
    multi-year ocular implant prescriber acceptance. Verify FY2024 net
    sales — early launch revenue often lags reported figures.
