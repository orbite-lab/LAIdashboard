  sales_notes: >
    Risvan is Rovi's monthly risperidone LAI built on the ISM in-situ
    depot platform. Approved EMA 2022 (ROVIRIS — Rovi's branded EMEA
    name). US filing status uncertain; Rovi has explored US partnership
    paths. Commercial trajectory in EU has been modest given competition
    from Risperdal Consta (Janssen, microsphere) and entry of UZEDY (BEPO)
    when partnered for EU.
