views:
  investor: >
    Risvan illustrates the structural challenge of being late to a crowded
    LAI category. Risperidone LAI options include Risperdal Consta (Janssen,
    microsphere, off-patent generics emerging), UZEDY (Teva/MedinCell BEPO,
    growing US share), and Risvan (Rovi ISM, EU only). The Indivior
    Perseris discontinuation (July 2024) is the cautionary case study —
    fourth-place risperidone LAI is non-viable even with US commercial
    infrastructure.
  partner: >
    Direct competitor to UZEDY in EU. For BD scouts, Risvan + ISM platform
    is potentially available for partnership at the platform level; verify
    Rovi BD posture. Useful as a comp data point for risperidone LAI
    economics in EU.
  acquirer: >
    Rovi (Madrid-listed) is a small-mid cap specialty pharma. Risvan is
    a minor contributor to Rovi enterprise value relative to its CDMO
    business. Not a strategic acquisition target on its own merits.

tactbio_view: >
  Late entrant in a crowded risperidone LAI category. Read-across from
  Indivior Perseris discontinuation suggests fourth-place LAI in psych is
  structurally challenged.

