commercial:
  sales_latest: null
  sales_notes: >
    Durysta is a biodegradable intracameral bimatoprost implant for
    primary open-angle glaucoma. FDA approval March 2020. Commercial
    trajectory has been modest — 3-month duration creates procedural
    friction in clinical workflow. The 2023-2024 emergence of Glaukos
    iDose (multi-year travoprost) presents structural competitive pressure.
    Durysta US is currently labelled for a single administration only —
    re-implantation not approved per most recent label review.
