views:
  investor: >
    Cautionary case for early-mover biodegradable ophthalmic implant.
    3-month duration created procedural-workflow challenges; iDose's
    multi-year duration takes the high-convenience tier. Durysta will
    likely persist as a niche product but is not a franchise asset.
  partner: >
    Not available — internal AbbVie/Allergan asset.
  acquirer: >
    Not actionable as a standalone target.

tactbio_view: >
  3-month bimatoprost intracameral implant. Strategic relevance is as a
  cautionary case for ophthalmic LAI duration tradeoffs — short duration
  + procedural friction limits commercial uptake.

