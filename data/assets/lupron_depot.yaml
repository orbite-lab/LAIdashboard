tactbio_view: 'The reference LHRH LAI by US revenue. Strategic relevance is as price/share
  anchor for any new entrant in prostate cancer hormonal therapy. Lupron Depot''s commercial
  durability post-LOE is the empirical demonstration that LAI manufacturing barriers and prescriber
  inertia create durable moats even in commoditized indications.

  '
