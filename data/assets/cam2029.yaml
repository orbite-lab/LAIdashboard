views:
  investor: >
    The FluidCrystal franchise-defining asset outside addiction. Two indication
    pivotals (acromegaly approved-pending-resubmission, NET readout-pending)
    create binary catalyst stack in 2026. Successful approval re-rates Camurus
    from a single-product (Buvidal) commercializer to a multi-product specialty
    pharma — the same step UZEDY did for MedinCell. Kill condition: second CRL,
    or SORENTO miss.
  partner: >
    Not currently available for licensing — Camurus retaining worldwide rights.
    Octreotide is competitive vs Sandostatin LAR (genericized) and Somatuline
    Depot (Ipsen, peptide self-assembly mechanism). For BD scouts looking at
    octreotide alternatives, CAM2029 sets the pricing ceiling for next-gen
    octreotide LAI; not actionable as a direct partnering target.
  acquirer: >
    Asset is the single biggest pipeline contributor to Camurus enterprise value.
    Any acquisition thesis rests on CAM2029 SORENTO/NET success plus Buvidal
    durability. Lilly incretin deal is a significant change-of-control consideration —
    review the deal for any ROFR / consent rights that would constrain a Camurus
    acquirer.

