tactbio_view: 'Defines HIV LAI category economics. Commercial trajectory is the leading indicator
  for whether infrequent-dosing antiretroviral therapy can take share from generic daily oral
  regimens — a structurally challenging comparison given oral ART pricing. Cabenuva''s growth
  tells us about the upper bound of LAI premium pricing in cost-sensitive disease categories.

  '
