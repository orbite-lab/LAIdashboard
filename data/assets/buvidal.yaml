tactbio_view: >
  Buvidal is the Camurus revenue engine and commercial validation of the
  FluidCrystal platform thesis. Combined Buvidal + Brixadi (royalty-equivalent)
  generated ~SEK 1.87B (~USD 178M) in 2024 — a meaningful scale for a
  formulation-platform biotech. Strategic question is sustainability of growth
  trajectory vs. competition from Sublocade in EU markets where access expands.
  Watch FY2025 guidance execution — Camurus' top end of SEK 3B requires
  continued European market penetration plus Brixadi US scaling. The Lilly
  incretin deal provides additional revenue optionality but is unlikely to
  contribute material near-term royalty given clinical-stage status.

