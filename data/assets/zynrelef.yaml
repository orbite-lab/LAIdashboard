views:
  investor: >
    Zynrelef is the test case for whether bupivacaine combination LAI
    can carve commercial space against Exparel's entrenched position.
    Modest revenue and Heron's persistent cash-burn create distressed-
    acquisition optionality. Strategic question is whether the
    multimodal-analgesia narrative is durable as opioid-sparing protocols
    continue to evolve.
  partner: >
    Heron-internal asset. Biochronomer platform may have residual
    licensing optionality outside the Zynrelef / Sustol commercial
    products. BD scouts would gate platform inquiry on Heron's cash
    runway and commercial strategy direction.
  acquirer: >
    Heron is a small-cap with a single approved combination LAI plus
    Sustol. Acquirer thesis would key off cost synergies and pain
    portfolio integration; Pacira is the most logical strategic acquirer
    but the failed GlycoMimetics deal complicates that read.

tactbio_view: >
  Combination LAI for postsurgical pain. Commercial trajectory tells us
  whether multimodal analgesia LAI can take share from Exparel monotherapy.
  Heron's cash-burn trajectory is the dominant operational variable.

