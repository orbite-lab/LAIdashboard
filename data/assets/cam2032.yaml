commercial:
  sales_latest: null
  sales_notes: 'Pre-commercial. Long-acting setmelanotide partnership with Rhythm Pharmaceuticals.
    Setmelanotide (oral/daily) is approved for genetic obesity (Bardet-Biedl, POMC, LEPR deficiency)
    under brand name IMCIVREE. Long-acting weekly/monthly LAI formulation expands convenience
    and adherence in chronic rare-disease use. Reference TAM is small (rare diseases) but
    potential expansion into hypothalamic obesity and broader obesity is the upside scenario.

    '
