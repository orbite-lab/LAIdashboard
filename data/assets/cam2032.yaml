views:
  investor: >
    Optionality asset rather than franchise-defining. Rhythm partnership
    validates FluidCrystal in rare endocrine but financial contribution is
    modest given Rhythm's commercial scale. Watch for any clinical readout
    that would provide a third proof point for FluidCrystal peptide delivery
    (CAM2029 octreotide and the Lilly incretin program being the other two).
  partner: >
    Not available — Rhythm is the exclusive partner for setmelanotide LAI.
    Reference data point for FluidCrystal peptide delivery in rare disease;
    BD scouts looking at melanocortin agonists need to consider this prior
    encumbrance.
  acquirer: >
    Minor enterprise-value contributor. Verify deal mechanics for any
    Rhythm change-of-control rights in case of Camurus acquisition.

