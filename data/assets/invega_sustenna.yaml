tactbio_view: >
  Anchor monthly LAI antipsychotic and revenue driver for the Invega
  franchise. The competitive question for TactBio is whether UZEDY and
  Risvan can take share from Sustenna at the monthly tier, while Hafyera's
  6-monthly duration defends the higher-value franchise tier. Sustenna LOE
  trajectory is the central event for the schizophrenia LAI market over
  the next 5 years.

