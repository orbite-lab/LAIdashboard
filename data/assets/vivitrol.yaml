tactbio_view: >
  Established LAI for addiction with dual indication coverage. Strategic
  positioning is unique — opioid antagonist mechanism distinguishes from
  buprenorphine LAI competitors (Sublocade/Brixadi) which are partial
  agonists. Watch market dynamics as overall OUD treatment shifts toward
  buprenorphine LAI; Vivitrol's defensible niche is patients who cannot
  or will not use partial agonists.

