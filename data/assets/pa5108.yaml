commercial:
  sales_latest: null
  sales_notes: 'Pre-commercial. PA5108 is a 6-month sustained-release latanoprost intracameral
    implant for primary open-angle glaucoma. Phase 2 studies in Australia and US ongoing.
    Direct competitor to Allergan/AbbVie Durysta (3-month bimatoprost) and Glaukos iDose TR
    (multi-year travoprost). Differentiation rests on duration profile and prostaglandin agonist
    class choice.

    '
