views:
  investor: 'Speculative early-stage glaucoma LAI implant. Bull case: 6-month duration positions
    between Durysta (3-month) and iDose (multi-year) as the convenience-pricing sweet spot.
    Bear case: glaucoma implant market remains adoption-constrained despite Durysta''s 4+
    years on market; PolyActiva''s smaller commercial scale means partnership economics will
    dominate the value capture.

    '
  partner: 'PolyActiva is the most actionable target in the glaucoma LAI implant category
    for BD scouts looking at next-generation prostaglandin delivery. Platform is open. Phase
    2 readout 2026 is the diligence trigger.

    '
  acquirer: 'Speculative — PolyActiva is private and pre-pivotal. Useful as an optionality
    lottery rather than a primary acquisition target.

    '
