tactbio_view: >
  Tracked as competitive context for Camurus CAM2029 (octreotide via FluidCrystal)
  and any future octreotide LAI entrants. Sandostatin LAR's commercial
  trajectory under generic pressure provides the price ceiling and share
  baseline that any innovator octreotide must overcome. Watch CAM2029
  Phase 3 readouts as the catalyst that defines next-generation octreotide
  LAI economics.

