tactbio_view: 'Strategic touchstone for retinal disease LAI thesis. Susvimo''s commercial
  trajectory will determine whether the wet AMD treatment paradigm shifts toward 6-monthly
  refill systems vs. continued monthly anti-VEGF injections or new biologics with extended
  duration. Recall history is a cautionary note for any device-formulation hybrid LAI strategy.
  Monitor relaunch uptake quarterly.

  '
