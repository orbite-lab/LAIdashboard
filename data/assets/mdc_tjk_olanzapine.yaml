commercial:
  sales_latest: null
  sales_notes: >
    Pre-commercial. SOLARIS Phase 3 reported positive in early 2025; NDA
    filing late 2025; PDUFA expected Q4 2026 per company guidance. The
    central commercial question is the FDA label outcome relative to
    Zyprexa Relprevv's black-box warning for post-injection delirium /
    sedation syndrome (PDSS). If TEV-749 demonstrates meaningfully lower
    PDSS rate, label could omit or soften the black box — the central
    differentiator. TAM in long-acting olanzapine is structurally large
    given Zyprexa Relprevv's restricted use under REMS. Royalty Pharma
    funded $100-125M of Phase 3 development cost in exchange for principal
    repayment plus 1-5% royalty post-approval (separate from MedinCell's
    underlying economics under the 2013 Teva agreement).
  list_price_usd: null
  addressable_market_usd_m: 800

