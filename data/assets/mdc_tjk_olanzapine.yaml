views:
  investor: >
    Second BEPO/Teva asset; PDUFA in Q4 2026 is the single biggest near-term
    catalyst for MedinCell. Black-box question on PDSS is the central tension.
    A clean label drives 5x revenue scenario vs Relprevv-equivalent restricted
    label. Royalty Pharma's $100-125M synthetic R&D financing tells you their
    diligence reached a probability-weighted positive view, but does not signal
    "high-quality royalty" — RPRX's economics depend on principal repayment,
    not pure royalty compounding.
  partner: >
    Not available — Teva exclusive worldwide. Reference point for olanzapine
    LAI economics. BD scouts evaluating BEPO platform for non-CNS indications
    can use TEV-749 progression as platform-validation evidence.
  acquirer: >
    Acquirer thesis on MedinCell hinges materially on TEV-749 milestone receipts.
    Diligence should focus on the Teva-MedinCell milestone schedule
    (specific milestone $ amounts and triggers per the 2013 agreement) plus
    any change-of-control provisions either Teva or Royalty Pharma may invoke.

