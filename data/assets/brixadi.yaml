tactbio_view: >
  Brixadi/Buvidal is the structurally disadvantaged second player in US OUD LAI
  behind Sublocade. Camurus-Braeburn must compete on dosing flexibility (weekly
  option) and provider economics. Follow-up question: is the weekly formulation
  genuinely expanding the LAI-treated patient population, or substituting for
  daily buprenorphine while Sublocade captures first-line LAI?

