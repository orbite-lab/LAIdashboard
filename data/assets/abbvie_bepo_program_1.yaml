views:
  investor: >
    Pure platform-validation optionality. Per-program milestone structure
    ($315M each across 6 programs = $1.89B total) provides MedinCell
    visibility into which programs advance. IND-2026 is the gating event.
  partner: >
    Not available for licensing — AbbVie exclusive. The collaboration
    encumbers BEPO across oncology, ophthalmology, CNS-neuro, and "other"
    therapeutic areas worldwide. BD scouts looking at BEPO must work
    around this scope.
  acquirer: >
    Significant change-of-control consideration. Diligence the AbbVie-MedinCell
    agreement for any AbbVie consent rights or termination provisions
    triggered by MedinCell change of control.

