commercial:
  sales_latest: null
  sales_notes: >
    Pre-commercial. EYP-1901 is a bioerodible intravitreal insert
    delivering vorolanib (a TKI with anti-VEGF activity) for sustained
    therapy in wet AMD. Two pivotal Phase 3 trials (LUGANO and LUCIA)
    are ongoing with primary completion expected in 2026. Asia rights
    licensed to Ono Pharmaceutical (October 2024); EyePoint retains
    worldwide ex-Asia. TAM in wet AMD is substantial ($10B+ globally
    for anti-VEGF therapies); LAI penetration potential is gated on
    duration vs. monthly intravitreal injections (Lucentis, Eylea,
    Vabysmo) and competitive positioning vs. Susvimo refill device.
  list_price_usd: null
