views:
  investor: >
    EYP-1901 is the pivotal-readout that defines whether EyePoint becomes
    a wet-AMD LAI franchise or remains a niche steroid-implant business.
    Phase 3 LUGANO/LUCIA readouts in 2026 are binary catalysts. Bull case:
    bioerodible insert with multi-month duration takes share from monthly
    anti-VEGF injections in real-world adherence-challenged patients. Bear
    case: efficacy gap vs Lucentis/Eylea/Vabysmo monthly is too large for
    label and physicians stick with current paradigm. Susvimo refill
    technology and Roche's commercial muscle are the structural competitive
    threat.
  partner: >
    Asia rights already encumbered (Ono, Oct 2024). US/EU rights remain
    available for partnering subject to EyePoint commercial strategy
    decisions post-Phase-3-readout. For BD scouts in retinal disease,
    EYP-1901 is the highest-value Durasert-derived asset and a
    plausible target for any pharma without an internal wet-AMD LAI
    program.
  acquirer: >
    EyePoint enterprise value is dominated by EYP-1901 trial outcomes.
    Acquisition thesis is binary on Phase 3 readout. Ono Asia license
    creates change-of-control consent considerations. Verify any
    additional in-licensing obligations on the Durasert platform.

tactbio_view: >
