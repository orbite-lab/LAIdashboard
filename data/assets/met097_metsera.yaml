  sales_notes: >
    Pre-commercial. MET-097 is Metsera's lead long-acting GLP-1 receptor
    agonist candidate, designed for monthly subcutaneous dosing. Phase 1
    data reported 2024-2025 supported once-monthly dosing potential with
    competitive weight-loss profile. Phase 2 dose-finding ongoing. Pipeline
    inherited by Pfizer as part of the September 2025 Metsera acquisition.
    Mechanism of long action combines proprietary peptide engineering and
    formulation approach (Metsera's HALO platform).
