scores:
  tech:
    value: 3
    rationale: VESPER-1 Phase 2b confirmed once-monthly-capable PK profile (15-16 day half-life) translates into clinical weight loss; HALO peptide-lipidation platform validated late-clinical at the asset level. Not yet commercial; Phase 3 initiation late 2025.
    confidence: medium
    scored_at: 2026-04-27
    scorer: CL
  clinical:
    value: 4
    rationale: VESPER-1 Phase 2b (n=215) showed up to 14.1% placebo-adjusted weight loss at 28 weekly doses with monotonic dose-response (0.4mg 8.1%, 0.6mg 10.0%, 0.9mg 13.0%, 1.2mg 14.1%); 36-week exploratory analysis shows continued weight loss without plateau. VESPER-3 titration arm shows manageable tolerability. Phase 3 initiation late 2025.
    confidence: high
    scored_at: 2026-04-27
    scorer: CL
