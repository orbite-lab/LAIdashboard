commercial:
  sales_latest: null
  sales_notes: >
    Pre-commercial. MariTide is a long-acting GIP receptor antagonist /
    GLP-1 receptor agonist bispecific peptide-antibody conjugate dosed
    monthly subcutaneously. Phase 2 obesity data reported December 2024
    showed competitive weight loss vs. weekly GLP-1 agonists. Phase 3
    program (MARITIME) initiated 2024-2025 across obesity, type 2
    diabetes, and obesity-related complications. Mechanism of long action
    is Fc-mediated half-life extension, NOT depot release — strictly
    speaking outside the v0 LAI taxonomy but tracked here for the
    obesity-LAI competitive landscape.
