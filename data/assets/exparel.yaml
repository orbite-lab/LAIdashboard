tactbio_view: >
  Mature postsurgical-pain LAI facing structural commercial headwinds —
  generic entry, payer resistance, and competition from new non-opioid
  alternatives (Zynrelef from Heron, opioid-sparing protocols). Strategic
  value resides in entrenched prescriber relationships and surgical workflow
  integration rather than IP-protected technology. Watch for 2025-2026
  sales trajectory as the test of post-LOE durability.

