tactbio_view: 'Largest somatostatin analog LAI by recent revenue. Strategic relevance is as
  the higher-bar comparator for any lanreotide- or octreotide-class entrant. Patent expiry
  trajectory creates the central question for Ipsen — defending Somatuline economics will
  require new indications, pricing flexibility, or commercial focus on geographies where generic
  entry remains less competitive.

  '
