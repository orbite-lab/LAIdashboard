tactbio_view: >
  UZEDY trajectory is the de-risking case for BEPO royalty compounding thesis,
  but represents only one molecule in one indication with one partner.
  The question is not whether UZEDY works commercially — it clearly does —
  but whether the growth trajectory Teva guides to (2026E $250-280M) fully
  captures market share from Invega Trinza/Hafyera franchise, or whether
  cannibalization has been underestimated.

