tactbio_view: 'UZEDY trajectory is the de-risking case for BEPO royalty compounding thesis,
  but represents only one molecule in one indication with one partner. The question is not
  whether UZEDY works commercially — it clearly does — but whether the growth trajectory Teva
  guides to (2026E $250-280M) fully captures market share from Invega Trinza/Hafyera franchise,
  or whether cannibalization has been underestimated.

  '
last_updated: 2026-04-21
views:
  investor: 'UZEDY trajectory is the de-risking case for BEPO royalty compounding thesis,
    but represents only one molecule in one indication with one partner. The question is not
    whether UZEDY works commercially — it clearly does — but whether the growth trajectory
    Teva guides to (2026E $250-280M) fully captures market share from Invega Trinza/Hafyera
    franchise, or whether cannibalization has been underestimated.

    '
  partner: Not available — Teva exclusive in psych under the 2013 BEPO master agreement. UZEDY's
    commercial trajectory is the principal real-world validation of BEPO platform manufacturing
    and regulatory execution; reference data point for any BD scout evaluating BEPO for non-psych
    indications.
  acquirer: Asset cash flows are split between Teva (commercial gross profit) and MedinCell
    (mid-to-high single-digit royalties + commercial milestones). MedinCell acquirer thesis
    hinges on this royalty stream durability plus TEV-749 olanzapine PDUFA optionality. Diligence
    the 2013 Teva agreement for change-of-control terms.
