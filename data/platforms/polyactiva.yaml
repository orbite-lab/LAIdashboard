mechanism_notes: >
  Biodegradable polymer implant technology developed by Australian biotech
  PolyActiva, targeting ophthalmic indications. Lead candidate is a 6-month
  bimatoprost ocular implant (PA5108) for glaucoma, positioned competitively
  to Allergan's Durysta with longer claimed duration. Privately held;
  limited public clinical data.

