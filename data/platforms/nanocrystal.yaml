mechanism_notes: 'Drug nanoparticle (typically <1µm) suspension technology, originally developed
  by Elan and acquired by Alkermes. Drug is milled to nanoscale and stabilized in aqueous
  suspension; sustained release via slow dissolution at the injection site. Cabotegravir LAI
  (Apretude/Cabenuva) and paliperidone palmitate (Invega Sustenna/Trinza/Hafyera) are the
  two leading commercial expressions.

  '
