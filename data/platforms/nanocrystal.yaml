tactbio_view: 'Most commercially successful LAI platform by revenue, with Invega franchise
  and cabotegravir generating multi-billion-dollar combined sales. Strategic value resides
  in existing product franchises rather than platform licensing potential. Watch Janssen''s
  response as Invega Sustenna faces generic LOE beyond 2030 — Hafyera''s 6-monthly duration
  is the franchise''s defensive moat.

  '
