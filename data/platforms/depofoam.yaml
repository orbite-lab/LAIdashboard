    scorer: CL

indication_fit:
  pain:
    value: 4
    rationale: Exparel is the reference local-anesthetic LAI for post-surgical pain; commercial position established but eroding under generic pressure.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  oncology:
    value: 1
    rationale: DepoCyt withdrawal demonstrates platform mismatch with sustained systemic oncology drug delivery requirements.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL

tactbio_view: >
  Niche local-administration liposomal depot with limited transferability
  beyond regional anesthesia. Strategic relevance to broader LAI thesis is
  primarily as a counterexample — demonstrates that not all "depot" platforms
  generalize across indications. Pacira's investment thesis is product-specific,
  not platform-driven.

