mechanism_notes: 'Multivesicular liposome technology — drug encapsulated in chambered lipid
  vesicles that erode over days, releasing API. Distinct from conventional liposomes (single
  bilayer) and lipid nanoparticles. Best-suited for short- to medium-duration sustained release
  at the local site of injection rather than systemic chronic dosing. Exparel for post-surgical
  pain is the lead commercial product.

  '
