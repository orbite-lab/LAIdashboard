id: idose
name: iDose
company: Glaukos
company_ticker: GKOS
country: US

mechanism: implant
duration_bucket: ultra_long
duration_range_days: [90, 1095]
payload_classes:
  - small_molecule

mechanism_notes: >
  Titanium intracameral implant with embedded membrane releasing travoprost
  (a prostaglandin analog) for sustained intraocular pressure reduction in
  glaucoma and ocular hypertension. iDose TR approved by FDA December 2023.
  Distinct from biodegradable Durysta (also bimatoprost-class but PLGA
  bioerodible) — iDose is non-bioerodible titanium device. Phase 3 trials
  demonstrated up to 36-month efficacy.

regulatory_history:
  - product: iDose TR (travoprost intracameral)
    indication: ophthalmology
    approval_year: 2023
    agency: FDA

ip_core_expiry_year: 2034
ip_continuation_strategy: strong
ip_fto_concerns: none
ip_notes: >
  Glaukos patent estate filed 2010s with active continuation strategy.
  Distinguished platform IP from polymer-based ophthalmic implants.

active_partners: []

