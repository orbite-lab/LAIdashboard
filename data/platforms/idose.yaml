indication_fit:
  ophthalmology:
    value: 5
    rationale: iDose competes directly with Durysta in glaucoma but with longer duration (up to 36 months vs Durysta's quarterly); first non-bioerodible sustained prostaglandin.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL

tactbio_view: >
  Internal Glaukos asset, not externally investable as platform. Strategic
  significance for TactBio is as a benchmark — iDose's longer duration
  pressures Allergan's Durysta and sets a higher bar for any new ophthalmic
  LAI platform. Watch commercial uptake post-launch as a leading indicator
  for prescriber/patient acceptance of multi-year ocular implants.

