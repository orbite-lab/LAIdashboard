mechanism_notes: 'Titanium intracameral implant with embedded membrane releasing travoprost
  (a prostaglandin analog) for sustained intraocular pressure reduction in glaucoma and ocular
  hypertension. iDose TR approved by FDA December 2023. Distinct from biodegradable Durysta
  (also bimatoprost-class but PLGA bioerodible) — iDose is non-bioerodible titanium device.
  Phase 3 trials demonstrated up to 36-month efficacy.

  '
