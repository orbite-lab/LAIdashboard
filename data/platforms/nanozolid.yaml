mechanism_notes: 'Calcium sulphate-based injectable depot technology. Drug is suspended in
  a calcium sulphate matrix that solidifies post-injection and erodes over weeks to months.
  Differentiated from polymer-based in-situ depots by inorganic matrix chemistry. Lead clinical
  asset is Larroca Depot (intraprostatic 2-HOF for prostate cancer active surveillance) in
  Phase IIb. Platform also explored for biologics (EGF preclinical) — relatively rare among
  in-situ depots.

  '
