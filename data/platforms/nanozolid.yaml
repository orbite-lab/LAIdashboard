id: nanozolid
name: NanoZolid
company: LIDDS AB
company_ticker: LIDDS
country: SE

mechanism: in_situ_depot
duration_bucket: long
duration_range_days: [90, 180]
payload_classes:
  - small_molecule
  - peptide
  - protein

mechanism_notes: >
  Calcium sulphate-based injectable depot technology. Drug is suspended in
  a calcium sulphate matrix that solidifies post-injection and erodes over
  weeks to months. Differentiated from polymer-based in-situ depots by
  inorganic matrix chemistry. Lead clinical asset is Larroca Depot
  (intraprostatic 2-HOF for prostate cancer active surveillance) in Phase IIb.
  Platform also explored for biologics (EGF preclinical) — relatively rare
  among in-situ depots.

