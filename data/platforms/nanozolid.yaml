tactbio_view: 'Speculative early-stage platform with single Phase IIb asset. Strategic interest
  is twofold — (1) the active-surveillance prostate cancer niche is under-served and could
  support a niche commercial product; (2) the inorganic-matrix mechanism is genuinely differentiated
  from polymer depots and may prove more compatible with sensitive payloads. Both theses require
  Phase IIb data confirmation before becoming actionable.

  '
