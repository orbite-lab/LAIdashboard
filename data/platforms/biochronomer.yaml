mechanism_notes: 'Polymer-based in-situ depot using polyorthoester chemistry. Distinct from
  PLGA-based competitors. Two approved products both for short-duration applications: Sustol
  (granisetron, 5-day chemotherapy-induced nausea prevention) and Zynrelef (bupivacaine +
  meloxicam, postsurgical analgesia, 72-hour duration). Lead applications are short-duration,
  reflecting polymer-degradation profile.

  '
