id: lupron_depot_platform
name: Lupron Depot
company: AbbVie / Takeda (originally Takeda)
company_ticker: ABBV
country: US

mechanism: microsphere
duration_bucket: long
duration_range_days: [28, 180]
payload_classes:
  - peptide

mechanism_notes: >
  Original PLGA microsphere LAI platform developed by Takeda for leuprolide
  delivery. Reference product is Lupron Depot, the first commercial peptide
  LAI (1989) and still the dominant prostate cancer LHRH agonist by sales.
  Multiple duration options (1-, 3-, 4-, 6-month). Partnered with AbbVie
  for US commercialization; Takeda retains other rights. Tracked as a
  product-specific platform rather than externally licensable.

regulatory_history:
  - product: Lupron Depot (leuprolide acetate, monthly)
    indication: oncology
    approval_year: 1989
    agency: FDA
  - product: Lupron Depot 3-month
    indication: oncology
    approval_year: 1995
    agency: FDA
  - product: Lupron Depot 6-month
    indication: oncology
    approval_year: 2011
    agency: FDA
  - product: Lupron Depot-PED (pediatric central precocious puberty)
    indication: endocrine
    approval_year: 1993
    agency: FDA

ip_core_expiry_year: 2010
ip_continuation_strategy: weak
ip_fto_concerns: none
ip_notes: >
  Core composition-of-matter and process patents long expired. Generic
  competition (e.g., Eligard from Tolmar, Camcevi from Foresee) active.
  Commercial moat now on manufacturing scale and prescriber familiarity.

active_partners:
  - name: AbbVie (US commercialization)
    tier: tier_1
    deal_id: null

