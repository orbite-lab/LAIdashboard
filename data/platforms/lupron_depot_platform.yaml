mechanism_notes: 'Original PLGA microsphere LAI platform developed by Takeda for leuprolide
  delivery. Reference product is Lupron Depot, the first commercial peptide LAI (1989) and
  still the dominant prostate cancer LHRH agonist by sales. Multiple duration options (1-,
  3-, 4-, 6-month). Partnered with AbbVie for US commercialization; Takeda retains other rights.
  Tracked as a product-specific platform rather than externally licensable.

  '
