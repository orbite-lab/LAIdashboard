tactbio_view: 'Tracked as competitive context — Lupron Depot is the price/share anchor for
  prostate cancer LHRH LAI globally. Any new entrant must position against Lupron''s prescriber
  inertia and Takeda/AbbVie commercial scale. Strategic relevance is in deal pricing — historical
  Lupron economics inform what new LHRH LAI entrants can realistically command.

  '
