id: spectrum
name: SpectruM
company: Foresee Pharmaceuticals
company_ticker: 6576
country: TW

mechanism: in_situ_depot
duration_bucket: long
duration_range_days: [30, 180]
payload_classes:
  - small_molecule
  - peptide

mechanism_notes: >
  Foresee proprietary Stabilized Pharmaceutical Excipient Compound
  Sustained Release Microparticle (SpectruM) technology — a polymer-based
  in-situ forming depot. Lead commercial product is Camcevi (leuprolide LAI)
  approved in US/EU for advanced prostate cancer, partnered with Accord
  Healthcare. Six-month formulation also approved.

regulatory_history:
  - product: Camcevi (leuprolide mesylate, monthly)
    indication: oncology
    approval_year: 2021
    agency: FDA
  - product: Camcevi (6-month)
    indication: oncology
    approval_year: 2024
    agency: FDA

ip_core_expiry_year: 2032
ip_continuation_strategy: moderate
ip_fto_concerns: none
ip_notes: >
  Foresee patent estate filed 2010s with continuation activity. Specific
  expiry years require verification.

active_partners:
  - name: Accord Healthcare (Camcevi commercialization)
    tier: tier_2
    deal_id: null

