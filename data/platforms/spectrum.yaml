tactbio_view: >
  Asian-domiciled (Taiwan) platform commercializing in Western markets via
  partner — interesting model but not a platform commanding licensing premium.
  Camcevi competes with Eligard, Lupron Depot, and Trelstar in mature LHRH
  category. Investment thesis is product-economics-driven, not platform-driven.

