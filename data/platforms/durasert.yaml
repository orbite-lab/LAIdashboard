mechanism_notes: 'Non-bioerodible polyimide/polyvinyl-alcohol intravitreal implant for sustained
  ocular drug delivery, typically 25-gauge injector deployment. Enables 6-month to 36-month
  durations within the eye — among the longest-acting platforms in any therapeutic area. Originally
  developed under "Vitrasert" branding for CMV retinitis (1996), evolved through Retisert
  (2005), Iluvien (2014, Alimera partnership), and Yutiq (2018) for various uveitis and DME
  indications. EyePoint''s pipeline candidate EYP-1901 (vorolanib via bioerodible Durasert
  E) targets wet AMD with 6-month dosing.

  '
