tactbio_view: 'The reference platform for ophthalmic implant LAI. Strategic question is whether
  EyePoint''s pipeline — particularly EYP-1901 in wet AMD — can establish a sustained-release
  alternative to monthly anti-VEGF injections. If successful, the platform could redefine
  retinal disease economics; if not, Durasert remains a niche steroid-implant business.

  '
