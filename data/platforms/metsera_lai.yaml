  tech:
    value: 3
    rationale: VESPER-1 Phase 2b (Sept 2025) confirmed HALO peptide-lipidation platform translates
      ultra-long PK (15-16 day half-life) into clinical weight loss — late-clinical platform
      validation. Multiple programs (MET-097, MET-233, MET-067) under same platform across
      GLP-1/amylin/GIP. Not yet commercial; Pfizer-led Phase 3 starting late 2025.
    confidence: medium
    scored_at: '2026-04-27'
    scorer: CL
