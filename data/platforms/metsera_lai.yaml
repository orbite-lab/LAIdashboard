indication_fit:
  metabolic:
    value: 4
    rationale: VESPER-1 Phase 2b (n=215) reported September 2025 — placebo-adjusted weight
      loss up to 14.1% at 28 weekly doses (1.2mg arm) without titration; dose-response across
