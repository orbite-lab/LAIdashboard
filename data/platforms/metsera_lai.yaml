    value: 4
    rationale: WO2017178829A1 (priority April 2016, expiry ~2037) provides foundational composition-of-matter
      coverage of peptide hormone analogues (Exendin-4, GLP-1, OXM, glucagon variants) — in-licensed
      to Zihipp/Metsera from Imperial College / IP2IPO. Underlying library of 20,000 peptides
      supports MET-097, MET-233, MET-034, MET-067. Pfizer post-acquisition adds tier-1 patent
      infrastructure plus continuation strategy. Royalty obligations to IP Group plc are a
      secondary economic consideration but do not weaken the freedom-to-operate position.
