id: pds
name: PDS (Susvimo)
company: Genentech (Roche)
company_ticker: ROG
country: CH

mechanism: implant
duration_bucket: ultra_long
duration_range_days: [120, 180]
payload_classes:
  - biologic

mechanism_notes: >
  Refillable, non-biodegradable, surgically-implanted intraocular drug delivery
  system. Distinguished from polymer implants by being a permanent device
  refilled via in-office procedure rather than a single-administration depot.
  Susvimo (ranibizumab via PDS) approved for wet AMD with 6-month refill interval.
  One of few LAI platforms successfully delivering biologics, owing to refill
  rather than depot encapsulation.

regulatory_history:
  - product: Susvimo (ranibizumab via PDS, wet AMD)
    indication: ophthalmology
    approval_year: 2021
    agency: FDA
  # Note: Susvimo was voluntarily recalled October 2022 for septum issue;
  # relaunched after corrective action. Verify current commercial status.

ip_core_expiry_year: 2032
ip_continuation_strategy: strong
ip_fto_concerns: none
ip_notes: >
  Roche/Genentech proprietary device IP with continuation strategy in place.
  Verify expiry dates via Orange Book; numbers here are placeholders pending
  confirmed patent search.

active_partners: []

