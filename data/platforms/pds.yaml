tactbio_view: 'Not investable directly (Roche-internal) but strategically critical reference
  for any retinal-disease LAI thesis. PDS effectively defines the upper bound of what biologic
  LAI can achieve commercially. The recall and relaunch arc is also a cautionary case study
  for device-formulation hybrid approaches.

  '
