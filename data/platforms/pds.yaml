mechanism_notes: 'Refillable, non-biodegradable, surgically-implanted intraocular drug delivery
  system. Distinguished from polymer implants by being a permanent device refilled via in-office
  procedure rather than a single-administration depot. Susvimo (ranibizumab via PDS) approved
  for wet AMD with 6-month refill interval. One of few LAI platforms successfully delivering
  biologics, owing to refill rather than depot encapsulation.

  '
