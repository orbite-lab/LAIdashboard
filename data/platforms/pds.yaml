indication_fit:
  ophthalmology:
    value: 5
    rationale: Highest-impact LAI for biologic ocular delivery; addresses the largest market in retinal disease (wet AMD) where treatment burden is the dominant adherence problem.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL

tactbio_view: >
  Not investable directly (Roche-internal) but strategically critical reference
  for any retinal-disease LAI thesis. PDS effectively defines the upper bound
  of what biologic LAI can achieve commercially. The recall and relaunch
  arc is also a cautionary case study for device-formulation hybrid approaches.

