tactbio_view: >
  French formulation platform with chronic execution challenges. Strategic
  relevance is primarily as a counterexample for dealability — the 2017
  Lilly partnership termination on BioChaperone Lispro illustrates how
  formulation-platform companies can lose tier-1 relationships when
  underlying programs disappoint. Tracking value low unless a specific
  program reaches Phase 3.

