id: medusa
name: Medusa
company: Adocia
company_ticker: ADOC
country: FR

mechanism: drug_conjugate
duration_bucket: medium
duration_range_days: [3, 30]
payload_classes:
  - peptide
  - protein

mechanism_notes: >
  Polysaccharide-based drug conjugate platform. Drug is non-covalently
  associated with a hydrophilically-modified polysaccharide carrier; release
  occurs via slow dissociation in vivo. Distinct from polymer microsphere
  or in-situ depot mechanisms by relying on physical association rather than
  encapsulation or matrix erosion. Primary applications in metabolic disease
  (insulin combinations, GLP-1).

