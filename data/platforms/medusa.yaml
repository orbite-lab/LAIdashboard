mechanism_notes: 'Polysaccharide-based drug conjugate platform. Drug is non-covalently associated
  with a hydrophilically-modified polysaccharide carrier; release occurs via slow dissociation
  in vivo. Distinct from polymer microsphere or in-situ depot mechanisms by relying on physical
  association rather than encapsulation or matrix erosion. Primary applications in metabolic
  disease (insulin combinations, GLP-1).

  '
