    scored_at: 2026-04-21
    scorer: RX
  ip:
    value: 4
    rationale: Core patents to 2031 with active continuation strategy through 2038+; AbbVie FTO diligence suggests no material exposure.
    confidence: medium
    scored_at: 2026-04-26
    scorer: CL
  dealability:
    value: 5
    rationale: Two tier-1 pharma partnerships (Teva, AbbVie), six-program AbbVie expansion plus option structures, mid-to-high single-digit royalties reference market-plus.
    confidence: high
    scored_at: 2026-04-21
    scorer: RX
