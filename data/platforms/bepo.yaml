    confidence: medium
    scored_at: 2026-04-26
    scorer: CL

indication_fit:
  psych:
    value: 5
    rationale: Validated by UZEDY; olanzapine LAI addresses PDSS black-box gap left by Zyprexa Relprevv; Teva commercial infrastructure in place.
    confidence: high
    scored_at: 2026-04-21
    scorer: RX
  addiction:
    value: 3
    rationale: Mechanism is compatible but Camurus FluidCrystal (Brixadi/Buvidal) has first-mover advantage and Indivior Sublocade dominates US market; entry would require differentiation on duration or site-of-care.
    confidence: medium
    scored_at: 2026-04-21
    scorer: RX
  hiv:
    value: 3
    rationale: ViiV Cabenuva/Apretude set a high bar using nanocrystal (Alkermes-derived) with 2-month dosing; BEPO could match or extend duration but would need a molecule partner and face entrenched incumbent.
    confidence: low
    scored_at: 2026-04-21
    scorer: RX
  oncology:
    value: 3
    rationale: AbbVie partnership scope reportedly includes oncology; no specific molecule disclosed; Zoladex/Lupron-style LHRH indications feasible but competitive.
    confidence: low
    scored_at: 2026-04-21
    scorer: RX
  ophthalmology:
    value: 4
    rationale: AbbVie partnership explicitly includes ophthalmology; BEPO's formulation control fits intravitreal or periocular depot requirements; OCS-05 reformulation hypothesis remains speculative.
    confidence: medium
    scored_at: 2026-04-21
    scorer: RX

views:
  investor: >
    Market correctly identifies BEPO as the best-positioned non-microsphere in-situ depot
    platform, but overprices the royalty-compounder transition before olanzapine PDUFA
    resolves. Contrarian read: Teva concentration risk is material — 100% of near-term
    royalty revenue derives from a single counterparty — and the AbbVie platform
    validation is priced in before a single clinical candidate files IND.
    Kill condition: olanzapine CRL, or Teva reducing commercial investment in UZEDY.
  partner: >
    BEPO is the second most-validated in-situ depot LAI platform after FluidCrystal.
    For BD scouts, BEPO is attractive if your molecule is a small molecule needing
    1-3 month duration with strong IP runway (2031 core + continuations to 2038+).
    Important caveat: most TAs are encumbered. Open scope effectively limited to
    addiction (commercially crowded), HIV, non-incretin metabolic, pain. AbbVie
    collaboration locks oncology, ophthalmology, CNS-neuro, and "other"; Teva
    locks psych. New partner inquiries should focus on the unfilled HIV/metabolic/
    pain band or wait for AbbVie program drops to free up space.
  acquirer: >
    MedinCell (MEDCL, Euronext Paris) is a small-cap clinical-stage / early-royalty
    biotech with significant counterparty concentration risk (Teva 100% of near-term
    royalties). M&A targets at this stage typically gate on platform-validation
    milestones — TEV-749 olanzapine PDUFA Q4 2026 is the single most important
    near-term catalyst. Both Teva (2013) and AbbVie (2024) deals likely contain
    consent / ROFR provisions on platform transfer; diligence both. Royalty Pharma
    olanzapine financing creates an additional creditor relationship to navigate.
    French listing and IFRS reporting add accounting complexity for US acquirers.

tactbio_view: >
  Best-positioned non-microsphere in-situ depot platform but overpriced before
  olanzapine PDUFA resolves. Teva concentration risk is the central tension.

