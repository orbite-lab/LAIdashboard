id: bepo
name: BEPO
company: MedinCell
company_ticker: MEDCL
country: FR

mechanism: in_situ_depot
duration_bucket: medium
duration_range_days: [7, 90]
payload_classes:
  - small_molecule
  - peptide

mechanism_notes: >
  Proprietary polymer blend (PLA-based) dissolved in biocompatible solvent.
  On contact with aqueous body fluid, solvent diffuses out and polymer
  precipitates, forming a solid depot that releases drug over weeks to months.
  Distinguished from Atrigel by polymer formulation and release profile control.

regulatory_history:
  - product: UZEDY (risperidone LAI)
    indication: psych
    approval_year: 2023
    agency: FDA
  # Olanzapine LAI — PDUFA expected Q4 2026 (per company guidance as of Q1 2026)

ip_core_expiry_year: 2033
ip_continuation_strategy: strong
ip_fto_concerns: none
ip_notes: >
  Core composition-of-matter patents filed mid-2010s with continuations filed
  through 2023. Manufacturing trade secrets material. FTO position reviewed
  during AbbVie diligence (no known issues). Needs verification against latest
  patent landscape search before next quarterly.

active_partners:
  - name: Teva
    tier: tier_1
    deal_id: 2018_teva_medincell
  - name: AbbVie
    tier: tier_1
    deal_id: 2022_abbvie_medincell

scores:
  tech:
    value: 4
    rationale: UZEDY commercial approval + olanzapine NDA under review validate the platform; payload breadth demonstrated to peptides in preclinical but not yet clinically.
    confidence: high
    scored_at: 2026-04-21
    scorer: RX
  ip:
    value: 4
    rationale: Core patents to 2033 with active continuation strategy; AbbVie FTO diligence suggests no material exposure.
    confidence: medium
    scored_at: 2026-04-21
    scorer: RX
  dealability:
    value: 5
    rationale: Two tier-1 pharma partnerships (Teva, AbbVie), six-program AbbVie expansion plus option structures, mid-to-high single-digit royalties reference market-plus.
    confidence: high
    scored_at: 2026-04-21
    scorer: RX

indication_fit:
  psych:
    value: 5
    rationale: Validated by UZEDY; olanzapine LAI addresses PDSS black-box gap left by Zyprexa Relprevv; Teva commercial infrastructure in place.
    confidence: high
    scored_at: 2026-04-21
    scorer: RX
  addiction:
    value: 3
    rationale: Mechanism is compatible but Camurus FluidCrystal (Brixadi/Buvidal) has first-mover advantage and Indivior Sublocade dominates US market; entry would require differentiation on duration or site-of-care.
    confidence: medium
    scored_at: 2026-04-21
    scorer: RX
  hiv:
    value: 3
    rationale: ViiV Cabenuva/Apretude set a high bar using nanocrystal (Alkermes-derived) with 2-month dosing; BEPO could match or extend duration but would need a molecule partner and face entrenched incumbent.
    confidence: low
    scored_at: 2026-04-21
    scorer: RX
  oncology:
    value: 3
    rationale: AbbVie partnership scope reportedly includes oncology; no specific molecule disclosed; Zoladex/Lupron-style LHRH indications feasible but competitive.
    confidence: low
    scored_at: 2026-04-21
    scorer: RX
  ophthalmology:
    value: 4
    rationale: AbbVie partnership explicitly includes ophthalmology; BEPO's formulation control fits intravitreal or periocular depot requirements; OCS-05 reformulation speculatively discussed in TactBio hypothesis memo.
    confidence: medium
    scored_at: 2026-04-21
    scorer: RX

tactbio_view: >
  Market correctly identifies BEPO as the best-positioned non-microsphere in-situ depot
  platform, but overprices the royalty-compounder transition before olanzapine PDUFA
  resolves. Contrarian read: Teva concentration risk is material — 100% of near-term
  royalty revenue derives from a single counterparty — and the AbbVie platform
  validation is priced in before a single clinical candidate files IND.
  Kill condition: olanzapine CRL, or Teva reducing commercial investment in UZEDY.

last_updated: 2026-04-21
