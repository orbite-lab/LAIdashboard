id: bepo
name: BEPO
company: MedinCell
company_id: medincell
company_ticker: MEDCL
country: FR

mechanism: in_situ_depot
duration_bucket: medium
duration_range_days: [7, 90]
payload_classes:
  - small_molecule
  - peptide

mechanism_notes: >
  Proprietary diblock copolymer system (PLA-PEG / PLGA-PEG) dissolved in
  biocompatible solvent. On contact with aqueous body fluid, solvent diffuses
  out and polymer precipitates, forming a solid depot that releases drug over
  weeks to months. Distinguished from Atrigel by polymer chemistry (block
  copolymer with PEG vs straight PLGA) and release profile control.
  Branded as "SteadyTeq" under the Teva license. Continuation patent layering
  extends effective protection to mid-2030s.

regulatory_history:
  - product: UZEDY (risperidone LAI)
    indication: psych
    approval_year: 2023
    agency: FDA

ip_core_expiry_year: 2031
ip_continuation_strategy: strong
ip_fto_concerns: none
ip_notes: >
  Core composition-of-matter patents filed 2010-2011 with continuations and
  formulation patents filed through 2018+. Manufacturing trade secrets material.
  AbbVie completed FTO diligence as part of 2024 deal — no known material exposure.
ip_records:
  - bepo_core_composition
  - bepo_continuation_2018
  - uzedy_formulation

