mechanism_notes: >
  MariTide (maridebart cafraglutide, AMG 133) is a half-life-extended
  bispecific peptide-antibody conjugate, NOT a true depot LAI. Listed in
  the tracker for competitive context against FluidCrystal incretin
  programs and other obesity LAI entrants. Mechanism of long action is
  Fc-conjugate half-life extension rather than depot release. May
  technically fall outside v0 LAI scope (taxonomy excludes half-life
  engineered biologics), but tracked here for the obesity-LAI
  competitive landscape.

