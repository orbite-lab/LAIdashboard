mechanism_notes: 'Subcutaneous EVA (ethylene vinyl acetate) polymer implant containing buprenorphine
  for sustained release over 6 months. Distinct from PLGA-based bioerodible implants — EVA
  is non-bioerodible and requires removal at end of dosing interval. Approved 2016 by FDA
  for OUD; commercial launch encountered challenges, manufacturing/commercial rights have
  transferred multiple times.

  '
