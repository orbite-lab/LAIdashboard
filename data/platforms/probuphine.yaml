tactbio_view: 'Tracked as competitive context and as a cautionary tale — Probuphine illustrates
  that LAI duration alone does not win markets; site-of-care workflow and prescriber preference
  matter more. The 6-month duration was insufficient compensation for surgical insertion friction.
  Strategic read-across to any prospective implant LAI in indications where injectable alternatives
  exist.

  '
