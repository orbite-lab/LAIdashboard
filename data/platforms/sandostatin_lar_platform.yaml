tactbio_view: >
  Reference product for peptide LAI commercial economics in endocrine
  oncology. Strategic read-across — Camurus CAM2029 (octreotide via
  FluidCrystal) directly challenges this franchise; Sandostatin LAR's
  current sales trajectory under generic and biosimilar pressure provides
  the price ceiling for any new octreotide LAI entrant.

