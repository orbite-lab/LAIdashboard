mechanism_notes: >
  PLGA microsphere platform developed for octreotide depot delivery.
  Sandostatin LAR (octreotide acetate) approved 1998 for acromegaly,
  carcinoid syndrome, and VIPomas. One of the earliest peptide LAI
  microsphere products and reference for somatostatin analog category.
  Tracked as product-specific platform; not externally licensed.

