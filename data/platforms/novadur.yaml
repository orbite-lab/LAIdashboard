mechanism_notes: 'Biodegradable PLGA-based solid polymer implant designed for intravitreal
  (Ozurdex) and intracameral (Durysta) administration. Distinguished from Durasert by its
  bioerodibility — no removal procedure required as the polymer hydrolyzes over months. Single-use
  applicator for in-office injection.

  '
regulatory_history:
- product: Ozurdex (dexamethasone, intravitreal)
  indication: ophthalmology
  approval_year: 2009
  agency: FDA
- product: Durysta (bimatoprost, intracameral)
  indication: ophthalmology
  approval_year: 2020
  agency: FDA
ip_core_expiry_year: 2028
ip_continuation_strategy: moderate
ip_fto_concerns: minor
ip_notes: 'Ozurdex faced multiple patent challenges and generic threats; Allergan prevailed
  in some, settled in others. Durysta benefits from newer intracameral-specific filings. Specific
  expiry years require Orange Book verification.

  '
