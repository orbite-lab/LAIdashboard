tactbio_view: 'AbbVie-owned ophthalmic implant platform paralleling Durasert in indication
  but distinguished by bioerodibility. Strategic interest is comparative — Novadur vs Durasert
  for a given drug class informs whether reformulation candidates favor erodible (3-6 month)
  or non-erodible (12-36 month) variants. The recent BEPO-AbbVie deal may also intersect this
  space as AbbVie''s broader LAI strategy evolves.

  '
