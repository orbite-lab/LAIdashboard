mechanism_notes: 'Pre-formed PLGA solid rod implant containing goserelin acetate. Inserted
  subcutaneously in the abdomen via 14- or 16-gauge applicator needle. Distinct from Lupron
  Depot microsphere approach — Zoladex is a single solid rod that erodes in vivo over the
  dosing interval. AstraZeneca legacy product; US rights transferred to TerSera Therapeutics.
  Approved 1989 in Europe, 1989 in US.

  '
