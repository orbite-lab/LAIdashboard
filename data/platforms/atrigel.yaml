tactbio_view: 'Platform value has shifted from IP-protected technology to manufacturing and
  regulatory moat. Still commercially important via Eligard and Sublocade but low investability
  as a standalone platform story. Reference point for what happens to in-situ depot platforms
  after core IP expires.

  '
