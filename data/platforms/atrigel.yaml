mechanism_notes: 'PLGA polymer dissolved in NMP solvent. Upon SC injection, NMP diffuses into
  tissue and polymer precipitates forming solid depot. One of the oldest in-situ depot platforms
  with the longest commercial track record (Eligard leuprolide LAI since 2002).

  '
