tactbio_view: 'European challenger platform with single-product commercialization in psych.
  Strategic question: can Rovi differentiate from BEPO-derived UZEDY or Risperdal Consta on
  duration, tolerability, or pricing? Without a clear edge, ISM risks becoming the fourth-place
  risperidone LAI rather than a platform commanding licensing premium.

  '
