mechanism_notes: 'PLGA-based in-situ forming microsphere technology — proprietary to Rovi.
  Distinct from in-situ depot platforms (BEPO, FluidCrystal, Atrigel) by forming discrete
  microspheres in vivo rather than a contiguous solid depot. Lead commercial product Risvan
  (risperidone ISM) approved 2022 in EU and 2023 in US (as Okedi/Risvan depending on region).

  '
