id: somatuline_autogel
name: Somatuline Autogel
company: Ipsen
company_ticker: IPN
country: FR

mechanism: in_situ_depot
duration_bucket: medium
duration_range_days: [28, 56]
payload_classes:
  - peptide

mechanism_notes: >
  Supersaturated aqueous solution of lanreotide that forms a depot upon
  subcutaneous injection — mechanism distinct from polymer-based in-situ
  depots in that lanreotide self-assembles into nanotubes. Approved 2007
  in US for acromegaly, expanded to neuroendocrine tumors. Distinguished
  by deep SC injection with prefilled syringe — unusually convenient
  administration for a peptide LAI.

regulatory_history:
  - product: Somatuline Autogel/Depot (lanreotide, 1- and 2-month)
    indication: endocrine
    approval_year: 2007
    agency: FDA
  - product: Somatuline Depot for NETs
    indication: oncology
    approval_year: 2014
    agency: FDA

ip_core_expiry_year: 2024
ip_continuation_strategy: moderate
ip_fto_concerns: minor
ip_notes: >
  Core composition-of-matter at or near expiry; product-specific patents
  (autoinjector device, indication expansions) extend protection. Verify
  status against Orange Book.

