mechanism_notes: 'Supersaturated aqueous solution of lanreotide that forms a depot upon subcutaneous
  injection — mechanism distinct from polymer-based in-situ depots in that lanreotide self-assembles
  into nanotubes. Approved 2007 in US for acromegaly, expanded to neuroendocrine tumors. Distinguished
  by deep SC injection with prefilled syringe — unusually convenient administration for a
  peptide LAI.

  '
