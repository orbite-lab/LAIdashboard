id: chroniject
name: Chroniject
company: Oakwood Laboratories
country: US

mechanism: microsphere
duration_bucket: long
duration_range_days: [7, 365]
payload_classes:
  - small_molecule
  - peptide
  - protein

mechanism_notes: >
  PLA/PLGA microsphere platform with claimed durations from one week to one
  year. Oakwood positions as a CDMO/development partner rather than asset
  developer. Recent partnerships include PharmaTher (ketamine LAI for
  neuropsychiatric disorders) demonstrating ongoing platform engagement
  for novel indications. Mechanism is conventional PLG microsphere; differentiation
  is on manufacturing flexibility and partner-program model.

regulatory_history: []

ip_core_expiry_year: 2025
ip_continuation_strategy: weak
ip_fto_concerns: minor
ip_notes: >
  PLACEHOLDER VALUE — Chroniject relies on long-established PLGA microsphere
  chemistry and trade-secret manufacturing know-how rather than primary
  composition-of-matter patents. Set to 2025 as a conservative placeholder;
  verify whether Oakwood holds any composition or process patents
  beyond standard trade-secret protection.

active_partners:
  - name: PharmaTher (ketamine LAI partnership)
    tier: tier_3
    deal_id: null

