tactbio_view: >
  Capacity provider rather than investable platform. Strategic relevance
  is primarily as a window into the broader LAI development pipeline —
  Oakwood's partner roster (when disclosed) reveals which biotechs are
  pursuing microsphere reformulations. Not a primary investment target
  on its own merits.

