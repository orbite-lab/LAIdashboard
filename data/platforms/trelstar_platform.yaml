tactbio_view: 'Tracked for competitive context in LHRH LAI category. Decapeptyl/Trelstar''s
  European market share is durable despite IP expiry — the LHRH LAI category has demonstrated
  strong post-LOE persistence due to prescriber inertia and manufacturing barriers. Read-across
  for new entrants: take share will require structural advantage (duration, tolerability,
  or pricing), not just regulatory approval.

  '
