id: lupron_microsphere_legacy
name: Trelstar
company: Debiopharm / Ipsen
company_ticker: IPN
country: FR

mechanism: microsphere
duration_bucket: long
duration_range_days: [28, 180]
payload_classes:
  - peptide

mechanism_notes: >
  PLGA microsphere platform for triptorelin (synthetic GnRH agonist) sustained
  release. Decapeptyl (EU/global ex-US) and Trelstar (US) are the commercial
  expressions. Multiple duration formats (1-, 3-, 6-month). Tracked as
  product-specific platform.

regulatory_history:
  - product: Trelstar (triptorelin pamoate, 1-month)
    indication: oncology
    approval_year: 2000
    agency: FDA
  - product: Trelstar 3-month
    indication: oncology
    approval_year: 2010
    agency: FDA
  - product: Trelstar 6-month
    indication: oncology
    approval_year: 2010
    agency: FDA
  - product: Decapeptyl (multiple durations, EU)
    indication: oncology
    approval_year: 1986
    agency: EMA

ip_core_expiry_year: 2008
ip_continuation_strategy: weak
ip_fto_concerns: none
ip_notes: >
  Foundational composition-of-matter and process patents long expired.
  Decapeptyl is a heritage brand with substantial European commercial
  presence despite IP expiry.

active_partners:
  - name: Verity Pharmaceuticals (US Trelstar commercial rights)
    tier: tier_2
    deal_id: null

scores:
  tech:
    value: 4
    rationale: Multiple duration formats demonstrate platform flexibility; decades of commercial use; reliable PK characterization.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  ip:
    value: 1
    rationale: Off-patent.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  dealability:
    value: 2
    rationale: Mature product; commercial transfers continue (e.g., Verity for US) but platform-licensing not active.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL

indication_fit:
  oncology:
    value: 5
    rationale: Decapeptyl/Trelstar is the third major LHRH LAI franchise (alongside Lupron Depot and Zoladex) in prostate cancer hormonal therapy; strong European presence.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  endocrine:
    value: 4
    rationale: Used for endometriosis, central precocious puberty, and other GnRH-responsive conditions; established but secondary to Lupron Depot in some indications.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL

tactbio_view: >
  Tracked for competitive context in LHRH LAI category. Decapeptyl/Trelstar's
  European market share is durable despite IP expiry — the LHRH LAI category
  has demonstrated strong post-LOE persistence due to prescriber inertia and
  manufacturing barriers. Read-across for new entrants: take share will
  require structural advantage (duration, tolerability, or pricing), not
  just regulatory approval.

