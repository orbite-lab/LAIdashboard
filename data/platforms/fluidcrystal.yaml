mechanism_notes: 'Lipid liquid crystal technology. Low-viscosity precursor solution transforms
  into liquid crystal depot on contact with aqueous body fluids. Covers weekly and monthly
  dosing in approved products (Buvidal/Brixadi); 6-month durations in clinical development
  (CAM2029). Distinctively broad duration range versus polymer in-situ depot competitors.

  '
