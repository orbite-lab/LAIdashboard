views:
  investor: 'Re-rated platform post-June 2025 Eli Lilly $870M deal. Previously framed as "under-appreciated
    platform with commercialization-heavy strategy" — the Lilly endorsement converts the dealability
    narrative. FluidCrystal is now the only LAI platform with both meaningful direct-commercial
    scale (Buvidal SEK 1.65B / USD 157M FY2024) AND tier-1 pharma external licensing (Lilly
    cardiometabolic incretins). Watch CAM2029 (Oclaiz) acromegaly resubmission post-CRL and
    SORENTO NET readout (late 2025/ early 2026) as the next franchise-defining catalysts.
    Contrarian read: Lilly''s mid-single-digit royalty (4-7%) is below what a transformational
    obesity-LAI platform deal could have commanded — Camurus took meaningful but not extraordinary
    economics, suggesting Lilly retained leverage on terms despite competitive obesity-LAI
    dynamics.

    '
  partner: 'Most differentiated in-situ depot for peptides and broad duration range (weekly
    to six-monthly). For BD scouts, FluidCrystal is the platform of choice if your molecule
    is a peptide, requires cold-chain-free room-temp stability, or needs duration flexibility.
    Open indications for new partners: oncology, ophthalmology, CNS-neuro, pain. Closed: addiction
    (Braeburn), metabolic/endocrine incretins (Lilly), rare-endocrine setmelanotide (Rhythm).
    Two approved products (Buvidal, Brixadi) and Lund-based commercial CMC capacity reduce
    technical risk for new programs. Mid-teen royalty has been achieved historically (Braeburn
    2014); tier-1 deals compress to mid-single-digit (Lilly 2025).

    '
  acquirer: 'Camurus (CAMX, Stockholm) is a small-cap commercial-stage biotech with direct
    commercial revenue (Buvidal) and royalty income (Brixadi via Braeburn). Major change-of-control
    considerations: (1) Lilly deal likely contains consent or ROFR provisions on platform
    transfer — verify; (2) Braeburn US Brixadi license likely has change-of-control ROFR —
    verify; (3) Rhythm setmelanotide partnership encumbers melanocortin LAI scope. Acquisition
    rationale rests on pipeline optionality (CAM2029) plus Lilly milestone tail rather than
    current EBITDA. Founder/board concentrated holdings — diligence ownership for deal-blocking
    minorities.

    '
tactbio_view: 'Re-rated platform post-June 2025 Eli Lilly $870M deal. FluidCrystal is now
