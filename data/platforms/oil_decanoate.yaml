tactbio_view: 'Tracked for competitive context, not investability. Oil decanoate solutions
  are the price-anchor floor for LAI markets — any newer platform must justify premium pricing
  relative to this generic baseline. The continued commercial life of decanoate antipsychotics
  in cost-sensitive markets is a structural headwind for innovator LAI economics outside high-income
  geographies.

  '
