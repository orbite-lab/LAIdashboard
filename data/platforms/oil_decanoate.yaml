mechanism_notes: 'Classical LAI mechanism — drug esterified with long aliphatic chain (decanoate,
  palmitate, enanthate) and dissolved in oily vehicle (sesame oil, cottonseed oil, castor
  oil, etc.). Slow drug release driven by partitioning from oil phase to interstitial fluid.
  Developed primarily 1950s-1980s; remains commercially significant in psychiatry (haloperidol
  decanoate, fluphenazine decanoate) and endocrinology (testosterone enanthate, cypionate).
  Tracked as a category rather than a proprietary platform.

  '
