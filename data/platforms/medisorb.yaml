tactbio_view: 'Foundational microsphere platform whose strategic relevance has shifted from
  technology innovation to manufacturing scale. Alkermes'' product portfolio built on Medisorb
  generates substantial revenue, but the platform itself is no longer a credible licensing
  story. Reference point for what mature LAI technology looks like post-IP cliff.

  '
