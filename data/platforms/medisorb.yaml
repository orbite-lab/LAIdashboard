mechanism_notes: 'PLG (poly-D,L-lactide-co-glycolide) biodegradable polymer microspheres.
  Drug is encapsulated via solvent extraction-evaporation; the microspheres hydrolyze in vivo
  over weeks. Industrial-scale manufacturing established for over two decades. Lyophilized
  vial format requires aqueous reconstitution before IM injection — a tolerated but operationally
  complex workflow.

  '
