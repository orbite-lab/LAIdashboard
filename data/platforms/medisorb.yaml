id: medisorb
name: Medisorb
company: Alkermes
company_ticker: ALKS
country: US

mechanism: microsphere
duration_bucket: medium
duration_range_days: [14, 28]
payload_classes:
  - small_molecule
  - peptide

mechanism_notes: >
  PLG (poly-D,L-lactide-co-glycolide) biodegradable polymer microspheres.
  Drug is encapsulated via solvent extraction-evaporation; the microspheres
  hydrolyze in vivo over weeks. Industrial-scale manufacturing established
  for over two decades. Lyophilized vial format requires aqueous reconstitution
  before IM injection — a tolerated but operationally complex workflow.

regulatory_history:
  - product: Risperdal Consta (risperidone)
    indication: psych
    approval_year: 2003
    agency: FDA
  - product: Vivitrol (naltrexone)
    indication: addiction
    approval_year: 2006
    agency: FDA
  - product: Bydureon (exenatide)
    indication: endocrine
    approval_year: 2012
    agency: FDA

ip_core_expiry_year: 2018
ip_continuation_strategy: weak
ip_fto_concerns: minor
ip_notes: >
  Core PLG microsphere patents long expired. Platform now competes on
  manufacturing know-how and product-specific patents rather than
  composition-of-matter exclusivity. Confidence on specific expiry
  year: medium — needs IP search verification.

active_partners:
  - name: Janssen / J&J (Risperdal Consta historical)
    tier: tier_1
    deal_id: null
  - name: AstraZeneca (Bydureon historical)
    tier: tier_1
    deal_id: null

scores:
  tech:
