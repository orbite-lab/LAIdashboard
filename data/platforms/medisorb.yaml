indication_fit:
  psych:
    value: 5
    rationale: Risperdal Consta is the original commercial LAI antipsychotic; microsphere mechanism well-characterized for risperidone/paliperidone class.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  addiction:
    value: 4
    rationale: Vivitrol is approved for both alcohol and opioid use disorder; commercially established but secondary to Sublocade/Brixadi for OUD specifically.
    confidence: high
    scored_at: 2026-04-25
    scorer: CL
  endocrine:
    value: 3
    rationale: Bydureon GLP-1 microsphere platform was technically successful but commercially disrupted by semaglutide and tirzepatide oral/weekly; mechanism viable but category dynamics shifted.
    confidence: medium
    scored_at: 2026-04-25
    scorer: CL

tactbio_view: >
  Foundational microsphere platform whose strategic relevance has shifted
  from technology innovation to manufacturing scale. Alkermes' product portfolio
  built on Medisorb generates substantial revenue, but the platform itself is
  no longer a credible licensing story. Reference point for what mature LAI
  technology looks like post-IP cliff.

