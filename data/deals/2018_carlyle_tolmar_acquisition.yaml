tactbio_view: >
  Tracked as a reference event for valuation of mature LAI platforms
  post-IP-cliff. Atrigel core composition was already expired (2008) at
  the time of Carlyle's acquisition; commercial value rested on Eligard
  product economics, manufacturing know-how, and the Sublocade royalty
  stream from Indivior. PE ownership establishes a private-market
  benchmark for mature LAI franchises. Verify current Tolmar ownership —
  PE secondary transactions can change the cap table without public
  disclosure.

