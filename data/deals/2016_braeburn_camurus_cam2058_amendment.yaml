tactbio_view: >
  Cautionary case study in amendment-deal accounting. The 2016 amendment
  expanded scope to a postoperative pain combination product (CAM2058)
  with non-disclosed late-stage milestones — but the asset never
  progressed meaningfully and the partnership refocused on CAM2038
  (Brixadi). Useful reference for two reasons: (1) demonstrates that
  amendment deals can fade silently rather than being formally terminated,
  making deal-status tracking inherently lagged; (2) reinforces that
  postoperative pain LAI is structurally challenging — Heron Zynrelef
  faces similar headwinds and Pacira Exparel has eroded under generic
  pressure. Camurus' subsequent strategic focus on addiction (Brixadi),
  endocrine (CAM2029), and cardiometabolic (Lilly partnership) avoided
  the postsurgical pain category, which is a deliberate omission worth
  noting.

