description: >
  Amendment to the 2014 Camurus-Braeburn license agreement, expanding scope
  to include buprenorphine combination products. Lead asset CAM2058
  (buprenorphine + granisetron extended-release injection) for postoperative
  pain, nausea, and vomiting. Braeburn obtained exclusive North American
  rights with options for Japan, Korea, Taiwan, and China. The CAM2058
  program did not progress through clinical development to commercialization
  — Braeburn underwent significant strategic shifts post-Probuphine
  underperformance and the Camurus partnership focus narrowed back to the
  core Brixadi/CAM2038 asset. Tracked here as a separate deal entry rather
  than an amendment-only footnote because it represented an independent
  expansion in scope and territory rights.

