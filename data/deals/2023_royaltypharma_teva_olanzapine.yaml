tactbio_view: >
  Structurally significant deal but commonly misunderstood. This is NOT
  Royalty Pharma buying a forward royalty stream — it is conditional
  R&D financing with a synthetic loan plus royalty kicker. The implications
  differ — (1) Royalty Pharma's diligence here validates Teva's olanzapine
  Phase 3 probability, but does not imply RPRX views the asset as a
  high-quality royalty compounder; (2) Teva preserves the bulk of olanzapine
  economics, paying out only repayment plus 1-5% royalty; (3) approval
  risk is borne primarily by Royalty Pharma, but Teva's optionality is
  preserved. For BEPO platform validation, the deal is meaningful but
  less of a signal than a true forward royalty purchase would have been.
  MedinCell does not benefit directly from this RPRX-Teva agreement —
  MedinCell's olanzapine economics flow through the original 2013 Teva
  agreement, separately.

