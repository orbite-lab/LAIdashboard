  royalty_notes: >
    Per Teva and Royalty Pharma joint press release Nov 13 2023:
    $100M upfront R&D funding to Teva, with mutual option to extend
    to $125M total. Conditional repayment terms: if FDA approves
    olanzapine LAI, Teva repays the funded amount over five years
    AND pays "low to mid single-digit" royalties on commercial sales.
    Royalty range 1-5% inferred from "low to mid single digit" language
    (typically interpreted as 1-6%, conservatively 1-5%). NOT a forward
    royalty stream purchase — Royalty Pharma's economics depend entirely
    on FDA approval, after which they receive principal-plus-royalty
    rather than a clean royalty asset.

option_structure: >
