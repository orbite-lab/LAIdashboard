id: 2023_royaltypharma_teva_olanzapine
deal_type: royalty_purchase
status: active

licensor: Teva Pharmaceuticals International GmbH
licensor_ticker: TEVA
licensee: Royalty Pharma
licensee_ticker: RPRX

asset_id: null
platform_id: bepo
description: >
  Synthetic R&D funding agreement (not a forward royalty purchase). Royalty
  Pharma provides Teva up to $100M to fund ongoing Phase 3 development costs
  for olanzapine LAI (TEV-'749, mdc-TJK), the second BEPO/SteadyTeq-based
  asset after UZEDY. Mutual option to extend total funding to $125M. Upon
  FDA approval, Teva repays the funded amount over five years AND pays
  low-to-mid-single-digit royalties to Royalty Pharma on commercialization.
  Structure is hybrid debt/royalty: principal repayment + royalty stream
  contingent on regulatory success. MedinCell is the underlying platform
  technology owner but is not a counterparty to this specific RPRX-Teva
  agreement.

