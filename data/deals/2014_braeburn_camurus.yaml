  royalty_notes: >
    Fully disclosed at signing per Camurus November 2014 press release:
    $20M upfront license fee, $35M development milestones for opioid
    dependence indication, $21M development milestones for pain indication
    ($56M development total), up to $75M sales-based milestones, and
    "mid-teen royalties" on Braeburn product sales. Mid-teen royalties
    interpreted as 13-17% range. The mid-teen royalty rate is notably
    high for a platform-licensing deal — reflecting strong negotiating
    position from Camurus given Braeburn's specialty-pharma focus on
    addiction therapeutics.

