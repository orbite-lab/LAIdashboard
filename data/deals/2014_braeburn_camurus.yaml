tactbio_view: >
  Among the best-disclosed LAI platform deals on record — useful as a
  pricing comp. Mid-teen royalty rate (13-17%) is unusually high for
  platform licensing and well above the mid-single-digit norm seen in
  the 2025 Lilly-Camurus deal. Two readings: (1) Braeburn was a
  smaller-tier counterparty so Camurus could extract better economics;
  (2) Camurus had strong negotiating position because the platform was
  earlier-stage and CAM2038 was clearly differentiated. Strategic context
  for benchmarking: tier-1 pharma deals (Lilly) compress royalties;
  specialty-pharma deals (Braeburn) preserve them. Brixadi US royalty
  receipts to Camurus reached SEK 212M (~$20M) in FY2024 implying
  Braeburn US net sales of ~$130-150M at the disclosed royalty range.

