description: >
  Exclusive license agreement for Camurus' weekly and monthly subcutaneous
  buprenorphine injection products (CAM2038, later marketed as Brixadi in
  the US and Buvidal/Sixmo in EU) for opioid use disorder and pain.
  Braeburn obtained exclusive rights in North America plus options for
  Japan, Korea, Taiwan, and China; Camurus retained rest of world.
  Subsequent 2016 amendment expanded to include CAM2058 (buprenorphine
  combination products for pain and nausea). Brixadi US launched
  September 2023 after FDA approval in May 2023.

