  royalty_notes: >
    Per Edison Group equity research (Dec 2018), aggregate milestones across
    all three CNS programs partnered with Teva total up to $366M, with
    "high single-digit royalties on tiered net sales." Teva 10-Q filings
    confirm specifically up to $112M in commercial milestones for the
    risperidone LAI program alone. For the olanzapine LAI (mdc-TJK)
    program announced separately in 2023, MedinCell may receive up to
    $117M in development and commercial milestones (per joint Teva-Royalty
    Pharma announcement). Royalty tiering is described as high single
    digits — 7-9% inferred range, but exact tiers are not separately
    published. Teva is responsible for all development costs.

