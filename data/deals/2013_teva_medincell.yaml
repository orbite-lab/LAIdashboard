tactbio_view: >
  Anchor deal for BEPO platform and primary source of near-term royalty
  revenue. Teva concentration risk is the central tension in any MedinCell
  investment thesis — a single counterparty, a single platform, two molecules.
  Per Teva 10-Q disclosures, $112M in commercial milestones tied to the
  risperidone (UZEDY) program alone is meaningful but not transformational
  given UZEDY's commercial trajectory ($191M FY2025 sales, Teva guiding
  $250-280M for FY2026). The November 2023 Royalty Pharma deal (separately
  tracked) is structurally a conditional R&D financing for olanzapine LAI
  rather than a forward royalty acquisition — RPRX provides Teva up to
  $125M for Phase 3 funding, recoverable post-approval as principal
  repayment plus 1-5% royalty. This is downside-protected lending more
  than royalty compounding, and does not directly benefit MedinCell
  (whose underlying olanzapine economics flow through this 2013 agreement
  separately).

