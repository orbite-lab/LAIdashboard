description: >
  Original November 2013 development and commercialization agreement covering
  multiple long-acting injectable products using BEPO technology. Lead asset
  was risperidone LAI (TV-46000, later marketed as UZEDY, approved April 2023).
  Subsequent expansions: olanzapine LAI (mdc-TJK), with Royalty Pharma
  acquiring a portion of the future royalty stream from Teva in late 2023.
  BEPO is licensed to Teva under the trade name SteadyTeq.

