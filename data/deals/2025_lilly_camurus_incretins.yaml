tactbio_view: >
  Single most important platform deal of 2025 for the LAI category and
  validates FluidCrystal at the highest tier of pharma counterparty.
  Strategic significance — (1) Lilly's choice of Camurus over BEPO,
  Atrigel, or in-house formulation work signals that FluidCrystal's
  payload-breadth and duration-range profile is genuinely differentiated
  for obesity peptides; (2) the structure ($290M upfront/dev + $580M sales
  + mid-single-digit royalty) sets a new market-rate benchmark for
  platform deals where the licensee provides the molecule; (3) the deal
  re-rates the dealability score for FluidCrystal — Camurus had not
  previously had a tier-1 pharma partnership, and now does. The contrarian
  read is that royalty tiers in mid-single digits are below what biotech
  bulls might have expected for a platform with Lilly's incretin franchise
  attached; this is "best-effort" obesity LAI rather than a transformational
  economics deal for Camurus.

