description: >
  Collaboration and license agreement granting Lilly exclusive worldwide rights
  to develop, manufacture, and commercialize long-acting incretin products for
  cardiometabolic health using Camurus' FluidCrystal technology. Covers up to
  four Lilly proprietary drug compounds, with selection across dual GIP/GLP-1
  agonists, triple GIP/glucagon/GLP-1 agonists, and an option to include amylin
  receptor agonists. Lilly's lead obesity assets (tirzepatide, retatrutide) are
  the strategic context — the deal targets extended-duration formulations as
  a competitive moat against rival monthly/quarterly LAI obesity entrants
  (Amgen MariTide, Metsera).

