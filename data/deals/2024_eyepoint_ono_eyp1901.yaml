description: >
  EyePoint announced an exclusive collaboration and license agreement
  with Ono granting Ono development and commercialization rights to
  EYP-1901 (vorolanib bioerodible intravitreal insert via Durasert E
  technology) in Japan, South Korea, Taiwan, and certain other Asian
  territories. EYP-1901 is in Phase 3 development for wet age-related
  macular degeneration (LUGANO and LUCIA pivotal trials). EyePoint
  retains worldwide ex-Asia rights. Verify deal date and exact territory
  list against EyePoint press releases.

