tactbio_view: >
  Mid-tier territorial licensing deal that validates EyePoint's
  EYP-1901/DURAVYU asset in Asia ahead of the pivotal LUGANO/LUCIA wet AMD
  readouts. Strategic relevance — (1) Ono is a credible Asian
  ophthalmology counterparty (Mydicar, Detic); (2) Asia territory rights
  remove a sourcing burden for EyePoint while preserving the high-value
  US/EU economics; (3) provides a platform-validation data point for the
  Durasert ophthalmic implant mechanism. Reference comp for territorial
  licensing economics for late-stage ophthalmic LAI.

