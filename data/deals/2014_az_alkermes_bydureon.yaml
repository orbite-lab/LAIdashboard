description: >
  Long-running royalty arrangement on Bydureon (exenatide microsphere LAI)
  net sales. Alkermes' royalty stream originated under the original
  Alkermes-Amylin development partnership; commercial counterparty changed
  through corporate ownership transitions: Bristol-Myers Squibb acquired
  Amylin in 2012, AstraZeneca acquired BMS diabetes business in February
  2014. Tracked under the 2014 AZ commercial-control date as a reference
  point. Bydureon US rights subsequently transferred to Lilly. Alkermes
  has retained royalty rights throughout the ownership transitions.

