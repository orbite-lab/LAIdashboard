tactbio_view: >
  Reference case for what happens to LAI economics when underlying category
  dynamics shift. Bydureon demonstrated that microsphere LAI technology is
  fully validated, but commercial trajectory was undermined by superior
  GLP-1 alternatives (semaglutide, dulaglutide). The royalty structure is
  also instructive — front-loaded 8% on early units captured most economic
  value during peak years (2014-2018) before competition compressed sales.
  Read across: technology execution alone does not guarantee commercial
  durability. Category dynamics matter at least as much. The post-2021
  step-down to flat 5.5% reflects a typical pharma-favorable royalty
  taper — innovators secure better terms in early years when category
  positioning is strongest.

