description: >
  Bydureon (exenatide microsphere LAI) commercial trajectory passed through
  multiple owners — originally Alkermes-Amylin-Lilly tripartite development;
  Bristol-Myers Squibb acquired Amylin 2012; AstraZeneca acquired BMS
  diabetes business 2014; AstraZeneca commercialized Bydureon through
  the late 2010s. Alkermes received royalties on net sales throughout.
  Tracked as a multi-decade reference for microsphere LAI commercialization
  arc.

