tactbio_view: >
  Reference case for what happens to LAI economics when underlying
  category dynamics shift. Bydureon demonstrated that microsphere LAI
  technology is fully validated, but commercial trajectory was undermined
  by superior GLP-1 alternatives (semaglutide, dulaglutide). Read across:
  technology execution alone does not guarantee commercial durability —
  category dynamics matter at least as much.

