  royalty_notes: >
    Verified from Alkermes 10-K filings and the original ACTII-Amylin
    development and license agreement (filed as exhibit to Alkermes 2023
    10-K). Tiered royalty structure: 8% on first 40 million units of
    Exenatide LAR (Bydureon) sold per calendar year, 5.5% on units sold
    above 40M per year. This tiering applied through December 31, 2021
    (the tenth full calendar year following first commercial sale).
    After Dec 31 2021, the royalty rate became flat 5.5% on all net sales
    for the remaining term. For oil-based products (Bydureon BCise),
    similar structure applied. For products not manufactured by Alkermes,
    flat 5.5% royalty applies. Earlier tracker version listed 8-12%
    range — that was incorrect; verified rates are 5.5-8% during the
    initial tier period and 5.5% flat thereafter.

