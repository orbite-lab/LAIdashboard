description: >
  Co-development and commercialization agreement for two-drug long-acting
  HIV regimen combining ViiV Healthcare's cabotegravir and Janssen's
  rilpivirine. Each company manufactures and supplies its own component;
  ViiV leads Phase III development with Janssen support. Subsequent
  co-packaging as Cabenuva approved in EU (December 2020) and US
  (January 2021). Each company also retains separate single-agent
  approvals (Apretude, Vocabria, Rekambys).

