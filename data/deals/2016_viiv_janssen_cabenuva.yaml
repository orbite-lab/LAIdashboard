tactbio_view: >
  Reference precedent for major-pharma HIV LAI partnership economics —
  but limited as a deal comp because the structure is genuinely opaque.
  Co-development between two tier-1 organizations bypasses the
  royalty/milestone disclosures typical of asymmetric platform-licensing
  deals. Strategic context: Cabenuva's commercial scaling reflects shared
  economics across two strong commercial organizations rather than a
  royalty compounder thesis. The structure is closer to a JV than a
  classical license.

