tactbio_view: >
  Platform validation deal: tier-1 pharma partner, multi-program scope,
  meaningful milestone total. Key tensions — (1) per-program structure
  ($315M each across 6 programs) gives MedinCell more transparency than
  bundled deals but also creates per-program execution risk; (2) specific
  therapeutic area allocations and molecules not disclosed, limiting
  ability to triangulate success probability; (3) renegotiation or program
  drops would be known only via press release. Monitor MEDCL quarterly
  calls for IND progression updates. The $35M upfront on $1.9B headline
  is light for a tier-1 platform deal — consistent with AbbVie retaining
  optionality program-by-program rather than committing capital upfront.

