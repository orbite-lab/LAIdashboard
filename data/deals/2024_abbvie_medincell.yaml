  royalty_notes: >
    Confirmed deal terms per MedinCell press release (April 16, 2024):
    $35M upfront, up to $1.9B in development and commercial milestones
    ($315M per program × 6 programs = $1.89B), plus royalties on worldwide
    sales. Royalty rates not separately disclosed; AbbVie funds development
    costs. The per-program structure is significant — implies independent
    progression rather than portfolio bundling, giving MedinCell visibility
    into which specific programs are advancing through milestones over time.

option_structure: >
  Multi-program platform collaboration with program-by-program option-like
  progression through development. AbbVie funds R&D costs.
