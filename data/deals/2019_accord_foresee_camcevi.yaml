description: >
  Accord Healthcare licensed global commercialization rights to Camcevi
  (leuprolide mesylate LAI, FP-001) excluding US, mainland China, Japan,
  Taiwan, Israel, Turkey, and certain Middle East countries (which were
  previously partnered or retained). Accord covers all commercialization
  costs in the territory. Camcevi is Foresee's proprietary 6-month and
  3-month subcutaneous leuprolide depot for advanced prostate cancer.

