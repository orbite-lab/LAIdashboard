tactbio_view: >
  Mid-tier territorial licensing deal for a value-priced LHRH LAI. Combined
  $86M is modest by platform-deal standards, reflecting Camcevi's
  positioning as a commodity-priced alternative to Lupron Depot/Eligard
  rather than a premium innovator product. Revenue-share structure (vs.
  classical royalty) is unusual and may reflect Accord's generics-focused
  business model and Foresee's interest in cash-flow share rather than
  upfront capital. Reference data point: territory-licensing economics for
  late-entrant LAI in mature LHRH category cap meaningfully below tier-1
  platform deals.

