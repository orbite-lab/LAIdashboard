description: >
  Astellas and EyePoint announced (October 2023) a collaboration and
  license agreement covering a novel sustained-release tyrosine kinase
  inhibitor delivered via EyePoint's Durasert E platform for retinal
  disease applications. The collaboration positions Durasert technology
  to deliver TKIs for non-VEGF retinal pathology — an early validation
  of the platform beyond steroid (Yutiq, Iluvien, Dexycu) and vorolanib
  (EYP-1901) applications. Verify deal date and exact terms — the
  Astellas-EyePoint relationship has multiple historical layers; this
  entry treats the most recent retinal collaboration.

