tactbio_view: >
  Anchor deal for BEPO platform and sole source of near-term royalty revenue.
  Teva concentration risk is the central tension in any MedinCell investment
  thesis — a single counterparty, a single platform, two molecules.
  The deal's absence of public financial disclosure is itself signal —
  royalty-focused structures commonly disclosed at a minimum; the fact that
  ranges are inferred rather than reported increases execution-risk premium.

