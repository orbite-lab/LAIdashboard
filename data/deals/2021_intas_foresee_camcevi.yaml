tactbio_view: >
  US-territory complement to the 2019 ex-US Accord deal. The combined
  Foresee deal stack across all territories totals $86M (Accord ex-US) +
  $207M (Intas US) + $123.85M (GenSci China) = ~$417M in headline
  milestone potential, with revenue share rather than royalty across all
  three. Reference economics for territorial licensing of late-entrant
  LHRH LAI: meaningful nominal milestone totals but revenue-share rather
  than royalty preserves more downside-protection for the licensor at the
  expense of upside leverage.

