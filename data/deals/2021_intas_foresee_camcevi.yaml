description: >
  Intas Pharmaceuticals (parent of Accord BioPharma US) licensed exclusive
  US commercialization rights for Camcevi (leuprolide mesylate LAI, FP-001).
  Complements the 2019 ex-US deal with Accord Healthcare. Camcevi launched
  US in 2021 after FDA approval (May 2021); 6-month formulation approved
  in 2024.

