tactbio_view: >
  The clearest competitive market signal of 2024 in the schizophrenia LAI
  category — fourth-place risperidone LAI was non-viable even within an
  established commercial organization. Perseris launched 2018, ran for
  six years, and was discontinued without a buyer despite Indivior having
  US commercial infrastructure. Strategic read-across: in crowded LAI
  categories, late entry without structural differentiation produces not
  just margin compression but outright commercial failure. This is the
  empirical case study supporting the "category position matters more
  than technology" thesis. Reference point for any prospective late-stage
  LAI in the same space (Rovi Risvan in particular).

