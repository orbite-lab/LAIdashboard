description: >
  Indivior announced discontinuation of Perseris (risperidone monthly LAI)
  in July 2024 as part of a strategic refocus on its OUD franchise (Sublocade)
  and Opvee. Perseris had launched in 2018 but never achieved meaningful
  commercial scale relative to Risperdal Consta, UZEDY, or the Invega
  franchise. This was a discontinuation rather than a divestiture — Indivior
  did not find a buyer for the asset. Tracked here as a competitive market
  event rather than a classical deal.

