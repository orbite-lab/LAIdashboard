tactbio_view: >
  Single most important obesity-LAI consolidation event of 2025. Pfizer's
  acquisition of Metsera completes the tier-1 pharma trio in long-acting
  incretins — Lilly + Camurus (FluidCrystal partnership), Amgen (MariTide
  internal), now Pfizer + Metsera. Strategic significance: confirms that
  every tier-1 with obesity ambitions needs a long-acting formulation
  position. Metsera-Pfizer is structured as M&A rather than license,
  signalling Pfizer values internal control over partnership flexibility —
  the opposite of Lilly's choice with Camurus. The valuation per Metsera
  share establishes a new comp for clinical-stage obesity LAI biotech
  enterprise value.

