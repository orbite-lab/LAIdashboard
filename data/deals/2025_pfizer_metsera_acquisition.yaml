description: >
  Pfizer announced the acquisition of Metsera (NASDAQ: MTSR) in September
  2025 to enter the long-acting incretin obesity LAI category. Metsera's
  pipeline includes MET-097 (long-acting GLP-1 receptor agonist) in early
  clinical development plus dual-mechanism amylin/GLP-1 candidates. The
  deal includes upfront cash plus contingent value rights tied to clinical
  and commercial milestones. Reported headline value approximately $5B
  base plus CVRs (verify exact terms against Pfizer 8-K and definitive
  agreement).

