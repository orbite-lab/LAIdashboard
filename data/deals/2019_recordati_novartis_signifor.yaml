tactbio_view: >
  Demonstrates that mature LAI franchises retain meaningful M&A value even
  at or near patent expiry. The $390M figure provides a reference point
  for valuing mature peptide LAI assets — useful comp for any Sandostatin
  LAR or Somatuline divestiture scenario. Important caveat: $390M covered
  three assets (Signifor IR, Signifor LAR, osilodrostat), so Signifor LAR
  alone is worth meaningfully less than the headline. Implied LAI-only
  valuation is probably $150-250M range, consistent with mid-tier endocrine
  LAI economics at LOE.

