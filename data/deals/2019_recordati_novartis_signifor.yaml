  royalty_notes: >
    Confirmed terms per Recordati and Novartis press releases:
    $390M upfront cash consideration (€351M at deal-close FX) paid at
    closing, funded by existing Recordati liquidity plus new debt facilities.
    Additional regulatory milestones tied to osilodrostat (Isturisa)
    approval and market access plus royalties on osilodrostat sales —
    specific milestone amounts and royalty rates not disclosed. Note:
    Signifor and Signifor LAR were not subject to additional milestones
    or royalties — those applied only to the developmental osilodrostat
    asset within the bundle.

