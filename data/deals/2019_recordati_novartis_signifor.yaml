description: >
  Recordati acquired worldwide rights to Novartis' Signifor (immediate-release
  pasireotide) and Signifor LAR (depot pasireotide) plus the late-stage
  development asset osilodrostat (LCI699, later approved as Isturisa).
  Strategic divestiture by Novartis as part of CEO Vas Narasimhan's
  portfolio pruning; rare-disease commercial focus by Recordati.
  Agreement signed July 12, 2019; closed October 23, 2019.

