tactbio_view: >
  Cautionary deal demonstrating that fourth-place LAI products in crowded
  categories struggle to attract premium valuations. Perseris faced
  Risperdal Consta, UZEDY, and Risvan in the risperidone LAI space and
  could not establish commercial differentiation. Strategic read: position
  matters more than technology in LAI deal economics — being late-to-market
  in a defined category compresses both commercial and dealability outcomes.

