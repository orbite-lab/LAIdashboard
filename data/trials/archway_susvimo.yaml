design: Randomized open-label active-controlled non-inferiority
primary_endpoint: Mean change in BCVA (best-corrected visual acuity) at weeks 36 and 40 (non-inferiority to monthly ranibizumab)
control_arm: active comparator
sponsor: Genentech / Roche
status: completed
