last_updated: 2026-04-25
notes: >
  Pivotal trial for Susvimo (ranibizumab via PDS implant, refilled every 24 weeks)
  in wet AMD. Demonstrated non-inferiority to monthly intravitreal ranibizumab.
  Approval, voluntary recall (2022 — septum/leak issue), and 2023 relaunch
  collectively define the cautionary case study for device-LAI hybrids.
