notes: >
  SOLARIS is the pivotal Phase 3 of TEV-749 (mdc-TJK), Teva and MedinCell's
  monthly olanzapine LAI built on BEPO. PDUFA expected Q4 2026. Critical
  question is post-injection delirium/sedation syndrome (PDSS) frequency
  vs Zyprexa Relprevv (which carries a black-box warning). If SOLARIS data
  show meaningfully lower PDSS rates, label could omit or soften the black box —
  the central commercial differentiator vs Relprevv. Verify enrollment and
  exact NCT against ClinicalTrials.gov as Teva sometimes uses program-numbered
  identifiers.
